version: '3.9'

services:
  # ─── MySQL Database ─────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: smartgym_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: smart_gym
      MYSQL_USER: gym_user
      MYSQL_PASSWORD: gym_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/setup.sql:/docker-entrypoint-initdb.d/setup.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartgym_api
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: gym_user
      DB_PASSWORD: gym_password
      DB_NAME: smart_gym
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ml_models:/app/app/ml/saved_models

  # ─── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartgym_ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:8000/api

volumes:
  mysql_data:
  ml_models:
